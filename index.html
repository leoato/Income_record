<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="월급 기록">
<link rel="apple-touch-icon" href="icon.jpg">
<title>월급 기록</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ══ THEMES ══════════════════════════════════════ */
[data-theme="dark"] {
  --bg:#1A1714; --bg2:#211E1A; --bg3:#2A2622;
  --brd:rgba(200,169,110,.13); --brd2:rgba(200,169,110,.28);
  --gold:#C8A96E; --gold-bg:rgba(200,169,110,.09);
  --txt:#F2EDE4; --txt2:#BDB5A8; --txt3:#7A7268;
  --kaist:#7EB8F7; --kaist-bg:rgba(126,184,247,.10); --kaist-brd:rgba(126,184,247,.30);
  --lib:#7EC8A4;   --lib-bg:rgba(126,200,164,.10);   --lib-brd:rgba(126,200,164,.30);
  --tutor:#E8B56A; --tutor-bg:rgba(232,181,106,.10); --tutor-brd:rgba(232,181,106,.30);
  --red:#E07070; --sh-bg:#221F1B; --shadow:none;
  --grid:rgba(200,169,110,.06);
}
[data-theme="light"] {
  --bg:#F5F0E8; --bg2:#FDFAF5; --bg3:#EDE8DE;
  --brd:rgba(160,130,80,.14); --brd2:rgba(160,130,80,.30);
  --gold:#8A6820; --gold-bg:rgba(138,104,32,.07);
  --txt:#2C2416; --txt2:#5C4E38; --txt3:#9A8E7A;
  --kaist:#2A6FC4; --kaist-bg:rgba(42,111,196,.08); --kaist-brd:rgba(42,111,196,.28);
  --lib:#1A8A5A;   --lib-bg:rgba(26,138,90,.08);    --lib-brd:rgba(26,138,90,.28);
  --tutor:#B86020; --tutor-bg:rgba(184,96,32,.08);  --tutor-brd:rgba(184,96,32,.28);
  --red:#C04040; --sh-bg:#FAF6EE; --shadow:0 2px 16px rgba(120,90,40,.10);
  --grid:rgba(160,130,80,.08);
}
[data-theme="novel"] {
  --bg:#12131F; --bg2:#1A1B2E; --bg3:#22243A;
  --brd:rgba(255,180,140,.10); --brd2:rgba(255,180,140,.24);
  --gold:#FFB48C; --gold-bg:rgba(255,180,140,.09);
  --txt:#EDE8FF; --txt2:#A8A2C8; --txt3:#5A5680;
  --kaist:#8BBFFF; --kaist-bg:rgba(139,191,255,.10); --kaist-brd:rgba(139,191,255,.28);
  --lib:#78DEB8;   --lib-bg:rgba(120,222,184,.10);   --lib-brd:rgba(120,222,184,.28);
  --tutor:#FFB48C; --tutor-bg:rgba(255,180,140,.10); --tutor-brd:rgba(255,180,140,.28);
  --red:#FF8080; --sh-bg:#191A2C; --shadow:none;
  --grid:rgba(255,180,140,.06);
}

/* ══ BASE ══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--txt);
  min-height:100vh;max-width:430px;margin:0 auto;
  padding:calc(env(safe-area-inset-top,0px) + 20px) 18px 0;
  transition:background .25s,color .25s;
  overflow-x:hidden;
}

/* ══ BOTTOM TAB NAV ══════════════════════════════ */
.tab-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--sh-bg);
  border-top:1px solid var(--brd2);
  display:grid;grid-template-columns:1fr 1fr;
  padding-bottom:env(safe-area-inset-bottom,0px);
  z-index:40;
}
.tab-nav-btn{
  padding:14px 0 12px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;
  color:var(--txt3);font-size:10px;font-weight:500;
  letter-spacing:.5px;cursor:pointer;transition:color .15s;
  -webkit-user-select:none;
}
.tab-nav-btn .tnb-icon{font-size:20px;line-height:1;}
.tab-nav-btn.on{color:var(--gold);}

/* ══ PAGES ══════════════════════════════════════ */
.page{display:none;padding-bottom:80px;}
.page.on{display:block;}

/* ══ HEADER ══════════════════════════════════════ */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.hdr-title{
  font-family:'Cormorant Garamond',serif;
  font-size:13px;font-weight:500;
  letter-spacing:3.5px;text-transform:uppercase;color:var(--gold);
}
.hdr-right{display:flex;gap:8px;align-items:center;}
.amt-toggle{
  display:flex;align-items:center;
  background:var(--bg2);border:1px solid var(--brd2);
  border-radius:20px;padding:3px;gap:2px;
}
.amt-pill{
  padding:4px 10px;border-radius:16px;border:none;
  font-family:'Noto Sans KR',sans-serif;
  font-size:10px;font-weight:500;color:var(--txt3);
  background:transparent;cursor:pointer;transition:all .18s;
  -webkit-user-select:none;
}
.amt-pill.on{background:var(--bg3);color:var(--gold);border:1px solid var(--brd2);}
.icon-btn{
  width:36px;height:36px;border:1px solid var(--brd2);
  background:var(--bg2);border-radius:10px;
  color:var(--txt2);font-size:15px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .18s;
}
.icon-btn:active{background:var(--bg3);border-color:var(--gold);color:var(--gold);transform:scale(.93);}

/* ══ THEME BAR ════════════════════════════════════ */
.theme-bar{
  display:flex;gap:5px;margin-bottom:24px;
  background:var(--bg2);border:1px solid var(--brd);
  border-radius:14px;padding:5px;
}
.tp{
  flex:1;padding:7px 4px;border-radius:10px;border:none;
  background:transparent;font-family:'Noto Sans KR',sans-serif;
  font-size:11px;font-weight:500;color:var(--txt3);
  cursor:pointer;transition:all .2s;-webkit-user-select:none;
}
.tp.on{background:var(--bg3);color:var(--gold);border:1px solid var(--brd2);}

/* ══ MONTH NAV ════════════════════════════════════ */
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.mnav-btn{
  width:40px;height:40px;background:none;border:none;
  color:var(--txt3);font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;transition:all .15s;-webkit-user-select:none;
}
.mnav-btn:active{background:var(--bg3);color:var(--gold);}
.mnav-ctr{text-align:center;}
.mnav-year{
  font-family:'Cormorant Garamond',serif;
  font-size:30px;font-weight:600;color:var(--txt);letter-spacing:.5px;line-height:1;
}
.mnav-sub{font-size:10px;color:var(--txt3);letter-spacing:2.5px;text-transform:uppercase;margin-top:4px;}

/* ══ SUMMARY STRIP ═══════════════════════════════ */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.sc{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:10px 6px;text-align:center;box-shadow:var(--shadow);}
.sc.total{border-color:var(--brd2);}
.sc-lbl{font-size:9px;color:var(--txt3);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.sc-val{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;line-height:1;}
.sc.total .sc-val{color:var(--gold);}
.sc.kaist .sc-val{color:var(--kaist);}
.sc.lib   .sc-val{color:var(--lib);}
.sc.tutor .sc-val{color:var(--tutor);}

/* ══ CALENDAR ════════════════════════════════════ */
.cal{background:var(--bg2);border:1px solid var(--brd);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);padding:9px 0;border-bottom:1px solid var(--brd);}
.dow{text-align:center;font-size:9px;font-weight:500;color:var(--txt3);letter-spacing:1.2px;text-transform:uppercase;}
.dow:first-child{color:var(--red);}
.dow:last-child{color:var(--kaist);}
.days{display:grid;grid-template-columns:repeat(7,1fr);}
.dc{min-height:64px;border-right:1px solid var(--brd);border-bottom:1px solid var(--brd);padding:7px 5px 5px;cursor:pointer;transition:background .12s;-webkit-user-select:none;}
.dc:nth-child(7n){border-right:none;}
.dc:active{background:var(--bg3);}
.dc.empty{cursor:default;pointer-events:none;}
.dn{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;color:var(--txt2);width:26px;height:26px;display:flex;align-items:center;justify-content:center;margin-bottom:2px;}
.dc:nth-child(7n+1) .dn{color:var(--red);}
.dc:nth-child(7n)   .dn{color:var(--kaist);}
.dc.today .dn{background:var(--gold);color:var(--bg);border-radius:50%;font-weight:600;}
.dc.today:nth-child(7n+1) .dn,.dc.today:nth-child(7n) .dn{color:var(--bg);}
.dc-bar{height:3px;border-radius:2px;margin-bottom:3px;width:100%;}
.dc-bar.kaist{background:var(--kaist);}
.dc-bar.lib{background:var(--lib);}
.dc-bar.tutor{background:var(--tutor);}
.dc-amt{font-family:'Cormorant Garamond',serif;font-size:11px;font-weight:600;color:var(--gold);line-height:1;}

/* ══ BACKDROP ════════════════════════════════════ */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);z-index:50;opacity:0;pointer-events:none;transition:opacity .28s;}
.backdrop.open{opacity:1;pointer-events:all;}

/* ══ BOTTOM SHEET ════════════════════════════════ */
.sheet{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(105%);
  width:100%;max-width:430px;background:var(--sh-bg);
  border-radius:26px 26px 0 0;border-top:1px solid var(--brd2);
  z-index:51;padding:0 22px calc(env(safe-area-inset-bottom,0px) + 28px);
  transition:transform .34s cubic-bezier(.32,1,.38,1);
}
.sheet.open{transform:translateX(-50%) translateY(0);}
.sh-handle{width:40px;height:4px;background:var(--brd2);border-radius:2px;margin:14px auto 20px;}
.sh-date{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--txt);margin-bottom:3px;}
.sh-sub{font-size:10px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;}
.job-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
.jb{padding:13px 4px;border-radius:14px;border:1px solid var(--brd);background:var(--bg2);color:var(--txt3);font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:500;cursor:pointer;text-align:center;line-height:1.4;transition:all .18s;-webkit-user-select:none;}
.jb .jb-icon{font-size:16px;display:block;margin-bottom:4px;}
.jb.sel.kaist{background:var(--kaist-bg);border-color:var(--kaist-brd);color:var(--kaist);}
.jb.sel.lib{background:var(--lib-bg);border-color:var(--lib-brd);color:var(--lib);}
.jb.sel.tutor{background:var(--tutor-bg);border-color:var(--tutor-brd);color:var(--tutor);}
.jb:active{transform:scale(.94);}
.amt-row{position:relative;margin-bottom:14px;}
.amt-pfx{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--txt3);pointer-events:none;}
.amt-inp{width:100%;background:var(--bg2);border:1px solid var(--brd2);border-radius:14px;color:var(--txt);font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;padding:14px 14px 14px 34px;outline:none;-webkit-appearance:none;transition:border-color .15s;}
.amt-inp:focus{border-color:var(--gold);}
.amt-inp::placeholder{color:var(--txt3);font-size:18px;font-family:'Noto Sans KR',sans-serif;font-weight:300;}
.memo-inp{width:100%;background:var(--bg2);border:1px solid var(--brd);border-radius:12px;color:var(--txt2);font-family:'Noto Sans KR',sans-serif;font-size:13px;padding:11px 14px;outline:none;-webkit-appearance:none;transition:border-color .15s;margin-bottom:20px;}
.memo-inp:focus{border-color:var(--brd2);}
.memo-inp::placeholder{color:var(--txt3);font-size:12px;}
.btn-row{display:flex;gap:10px;}
.del-btn{width:48px;height:52px;background:rgba(224,112,112,.08);border:1px solid rgba(224,112,112,.22);border-radius:14px;color:var(--red);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;}
.del-btn:active{background:rgba(224,112,112,.18);transform:scale(.94);}
.del-btn:disabled{opacity:.22;pointer-events:none;}
.done-btn{flex:1;padding:15px;background:var(--gold);border:none;border-radius:14px;color:var(--bg);font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:opacity .15s;-webkit-user-select:none;}
.done-btn:active{opacity:.8;transform:scale(.98);}

/* ══ ANALYSIS PAGE ════════════════════════════════ */
.an-section{margin-bottom:24px;}
.an-title{
  font-family:'Cormorant Garamond',serif;
  font-size:18px;font-weight:600;color:var(--txt);
  margin-bottom:14px;
  display:flex;align-items:baseline;gap:8px;
}
.an-title-sub{font-size:11px;color:var(--txt3);font-family:'Noto Sans KR',sans-serif;font-weight:400;letter-spacing:.5px;}

/* range selector */
.range-bar{
  display:flex;gap:5px;margin-bottom:20px;
  background:var(--bg2);border:1px solid var(--brd);
  border-radius:14px;padding:5px;
}
.rp{
  flex:1;padding:7px 4px;border-radius:10px;border:none;
  background:transparent;font-family:'Noto Sans KR',sans-serif;
  font-size:11px;font-weight:500;color:var(--txt3);
  cursor:pointer;transition:all .2s;-webkit-user-select:none;
}
.rp.on{background:var(--bg3);color:var(--gold);border:1px solid var(--brd2);}

/* custom range row */
.custom-range-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;margin-top:-10px;
  padding:0 2px;
}
.cr-label{font-size:11px;color:var(--txt3);letter-spacing:.5px;}
.cr-input-wrap{display:flex;align-items:center;gap:6px;}
.cr-input{
  width:56px;background:var(--bg2);
  border:1px solid var(--brd2);border-radius:10px;
  color:var(--gold);font-family:'Cormorant Garamond',serif;
  font-size:16px;font-weight:600;
  padding:5px 10px;text-align:center;
  outline:none;-webkit-appearance:none;
  transition:border-color .15s;
}
.cr-input:focus{border-color:var(--gold);}
.cr-unit{font-size:11px;color:var(--txt3);}

/* stat cards */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.stat-card{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);}
.stat-card.wide{grid-column:1/-1;}
.stat-lbl{font-size:10px;color:var(--txt3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--gold);line-height:1;margin-bottom:3px;}
.stat-sub{font-size:11px;color:var(--txt3);}

/* job breakdown */
.job-breakdown{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:18px;box-shadow:var(--shadow);}
.jb-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.jb-row:last-child{margin-bottom:0;}
.jb-info{flex:1;min-width:0;}
.jb-name{font-size:12px;font-weight:500;color:var(--txt2);margin-bottom:4px;}
.jb-bar-wrap{background:var(--bg3);border-radius:99px;height:6px;overflow:hidden;}
.jb-bar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.jb-bar-fill.kaist{background:var(--kaist);}
.jb-bar-fill.lib{background:var(--lib);}
.jb-bar-fill.tutor{background:var(--tutor);}
.jb-right{text-align:right;flex-shrink:0;}
.jb-amt{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;}
.jb-amt.kaist{color:var(--kaist);}
.jb-amt.lib{color:var(--lib);}
.jb-amt.tutor{color:var(--tutor);}
.jb-pct{font-size:10px;color:var(--txt3);margin-top:2px;}

/* chart container */
.chart-card{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px;}
.chart-card-title{font-size:11px;color:var(--txt3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:16px;}
.chart-wrap{position:relative;}
.h200{height:200px;}
.h160{height:160px;}

/* monthly table */
.mo-table{width:100%;border-collapse:collapse;}
.mo-table th{font-size:9px;color:var(--txt3);letter-spacing:1px;text-transform:uppercase;padding:6px 8px;text-align:right;border-bottom:1px solid var(--brd);}
.mo-table th:first-child{text-align:left;}
.mo-table td{padding:10px 8px;font-size:12px;color:var(--txt2);border-bottom:1px solid var(--brd);text-align:right;vertical-align:middle;}
.mo-table td:first-child{text-align:left;font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--txt);}
.mo-table tr:last-child td{border-bottom:none;}
.mo-table .mono{font-family:'Cormorant Garamond',serif;font-size:14px;}
.mo-table .highlight td{color:var(--gold);}

/* empty state */
.empty-an{
  text-align:center;padding:48px 0;
  color:var(--txt3);font-size:13px;
}
.empty-an-icon{font-size:40px;margin-bottom:12px;opacity:.5;}

/* ══ DATA MODAL ══════════════════════════════════ */
.data-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);z-index:60;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s;}
.data-bg.open{opacity:1;pointer-events:all;}
.data-modal{width:100%;max-width:430px;background:var(--sh-bg);border-radius:26px 26px 0 0;border-top:1px solid var(--brd2);padding:0 20px calc(env(safe-area-inset-bottom,0px) + 28px);transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.38,1);}
.data-bg.open .data-modal{transform:translateY(0);}
.data-hdr{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--txt);padding:22px 0 16px;border-bottom:1px solid var(--brd);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.modal-x{background:none;border:none;color:var(--txt3);font-size:18px;cursor:pointer;}
.d-btn{width:100%;display:flex;align-items:center;gap:14px;background:var(--bg3);border:1px solid var(--brd);border-radius:14px;padding:15px 16px;margin-bottom:10px;cursor:pointer;text-align:left;transition:all .15s;-webkit-user-select:none;}
.d-btn:active{background:var(--bg2);}
.d-icon{font-size:21px;flex-shrink:0;}
.d-lbl{font-size:14px;font-weight:500;color:var(--txt);margin-bottom:2px;}
.d-desc{font-size:11px;color:var(--txt3);}
#importInput{display:none;}

/* ══ TOAST ════════════════════════════════════════ */
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 72px);left:50%;transform:translateX(-50%) translateY(14px);background:var(--bg3);border:1px solid var(--brd2);border-radius:50px;padding:10px 22px;font-size:13px;color:var(--txt);white-space:nowrap;z-index:99;opacity:0;transition:all .22s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--lib-brd);color:var(--lib);}
.toast.err{border-color:rgba(224,112,112,.4);color:var(--red);}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px;}
</style>
</head>
<body>

<!-- ══ PAGE: CALENDAR ══════════════════════════════ -->
<div class="page on" id="pg-cal">
  <!-- Header -->
  <div class="hdr">
    <div class="hdr-title">Income Log</div>
    <div class="hdr-right">
      <div class="amt-toggle">
        <button class="amt-pill on" id="pill-round" onclick="setAmt('round')">반올림</button>
        <button class="amt-pill"   id="pill-exact" onclick="setAmt('exact')">정확</button>
      </div>
      <button class="icon-btn" onclick="openDataModal()">⋯</button>
    </div>
  </div>
  <!-- Theme bar -->
  <div class="theme-bar">
    <button class="tp" id="tp-light" onclick="setTheme('light')">☀️ 라이트</button>
    <button class="tp on" id="tp-dark" onclick="setTheme('dark')">🌙 다크</button>
    <button class="tp" id="tp-novel" onclick="setTheme('novel')">✦ 인디고</button>
  </div>
  <!-- Month nav -->
  <div class="mnav">
    <button class="mnav-btn" onclick="chMonth(-1)">‹</button>
    <div class="mnav-ctr">
      <div class="mnav-year" id="mYear"></div>
      <div class="mnav-sub"  id="mSub"></div>
    </div>
    <button class="mnav-btn" onclick="chMonth(1)">›</button>
  </div>
  <!-- Summary -->
  <div class="summary">
    <div class="sc total"><div class="sc-lbl">합계</div><div class="sc-val" id="sTotal">—</div></div>
    <div class="sc kaist"><div class="sc-lbl">카이스트</div><div class="sc-val" id="sKaist">—</div></div>
    <div class="sc lib">  <div class="sc-lbl">도서관</div><div class="sc-val" id="sLib">—</div></div>

  </div>
  <!-- Calendar -->
  <div class="cal">
    <div class="dow-row">
      <div class="dow">일</div><div class="dow">월</div><div class="dow">화</div>
      <div class="dow">수</div><div class="dow">목</div><div class="dow">금</div><div class="dow">토</div>
    </div>
    <div class="days" id="days"></div>
  </div>
</div>

<!-- ══ PAGE: ANALYSIS ══════════════════════════════ -->
<div class="page" id="pg-an">
  <!-- Header -->
  <div class="hdr">
    <div class="hdr-title">분석</div>
  </div>

  <!-- Range bar -->

    <button class="rp" id="rp1"   onclick="setRange(1)">1개월</button>
    <button class="rp" id="rp3"   onclick="setRange(3)">3개월</button>

  <div id="anContent"></div>

<!-- ══ BOTTOM TAB NAV ══════════════════════════════ -->
<nav class="tab-nav">

  </button>
  <button class="tab-nav-btn" id="tnb-an" onclick="switchPage('an')">
    <span class="tnb-icon">📊</span>분석

<!-- Sheet backdrop -->
<div class="backdrop" id="backdrop" onclick="closeSheet()"></div>

<!-- Bottom Sheet -->
<div class="sheet" id="sheet">
  <div class="sh-handle"></div>

  <div class="job-row">
    <button class="jb" id="jb-kaist" onclick="pickJob('kaist')">
      <span class="jb-icon">🏫</span>카이스트 수학
    </button>
    <button class="jb" id="jb-lib" onclick="pickJob('lib')">

    </button>

    </button>

    <span class="amt-pfx">₩</span>
    <input class="amt-inp" id="amtInp" type="number" inputmode="numeric" placeholder="금액 입력">
  </div>
  <input class="memo-inp" id="memoInp" type="text" placeholder="메모 (선택)">
  <div class="btn-row">
    <button class="del-btn" id="delBtn" onclick="deleteEntry()">🗑</button>
    <button class="done-btn" onclick="saveAndClose()">완료</button>
  </div>
</div>

<!-- Data Modal -->
<div class="data-bg" id="dataBg" onclick="onDataBg(event)">
  <div class="data-modal">
    <div class="data-hdr">
      <span>데이터 관리</span>
      <button class="modal-x" onclick="closeDataModal()">✕</button>
    </div>
    <button class="d-btn" onclick="exportJSON()">
      <span class="d-icon">📤</span>
      <div><div class="d-lbl">JSON 내보내기</div><div class="d-desc">전체 기록을 JSON 파일로 저장</div></div>
    </button>
    <button class="d-btn" onclick="document.getElementById('importInput').click()">
      <span class="d-icon">📥</span>
      <div><div class="d-lbl">JSON 불러오기</div><div class="d-desc">백업 파일에서 기록 복원</div></div>
    </button>
    <button class="d-btn" onclick="confirmClear()">
      <span class="d-icon">🗑️</span>
      <div><div class="d-lbl" style="color:var(--red)">전체 삭제</div><div class="d-desc">모든 기록 삭제 (되돌릴 수 없음)</div></div>
    </button>
  </div>
</div>
<input type="file" id="importInput" accept=".json" onchange="importJSON(this)">

<div class="toast" id="toast"></div>

<script>
'use strict';

/* ── Config ──────────────────────────── */
const JOB = {
  kaist: { label:'카이스트 수학', short:'카이스트', color:'kaist' },
  lib:   { label:'도서관 근로',   short:'도서관',   color:'lib' },
  tutor: { label:'과외',          short:'과외',     color:'tutor' },
};
const MO_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const MO_EN = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const DOW   = ['일','월','화','수','목','금','토'];

/* ── State ─────────────────────────── */
let CY, CM;
let editDay = null, pickedJob = null;
let amtMode = 'round';
let anRange = 0;     // default: 전체
let _charts = {};    // Chart.js instances

/* ── Storage ─────────────────────────── */
const dKey  = (y,m,d) => `inc_${y}_${String(m+1).padStart(2,'0')}_${String(d).padStart(2,'0')}`;
function getD(y,m,d) {
  const raw = JSON.parse(localStorage.getItem(dKey(y,m,d)) || 'null');
  if (!raw) return null;
  // legacy format: array → take first element
  if (Array.isArray(raw)) return raw.length ? raw[0] : null;
  return raw;
}
const saveD = (y,m,d,v) => v
  ? localStorage.setItem(dKey(y,m,d), JSON.stringify(v))
  : localStorage.removeItem(dKey(y,m,d));
const allKeys = () => Object.keys(localStorage).filter(k=>k.startsWith('inc_')).sort();

/* ── Collect all data by month ────────── */
function collectMonths() {
  // returns array of { ym:'2026-03', year, month(0-idx), kaist, lib, tutor, total }
  const map = {};
  allKeys().forEach(k => {
    // key format: inc_YYYY_MM_DD
    const parts = k.split('_'); // ['inc','2026','03','15']
    if (parts.length < 4) return;
    const ym = `${parts[1]}-${parts[2]}`;
    const entry = JSON.parse(localStorage.getItem(k) || 'null');
    if (!entry || !entry.amount) return;
    if (!map[ym]) map[ym] = { ym, year:parseInt(parts[1]), month:parseInt(parts[2])-1, kaist:0, lib:0, tutor:0, total:0 };
    map[ym][entry.job] = (map[ym][entry.job]||0) + Number(entry.amount);
    map[ym].total += Number(entry.amount);
  });
  return Object.values(map).sort((a,b)=>a.ym.localeCompare(b.ym));
}

/* ── Format ─────────────────────────── */
function fmtAmt(n) {
  n = Number(n)||0;
  if (amtMode === 'round') {
    const man = Math.round(n/10000); return man ? man+'만' : '0';
  }
  if (!n) return '0';
  if (n >= 10000) { const m=Math.floor(n/10000),r=n%10000; return r?m+'만 '+r.toLocaleString():m+'만'; }
  return n.toLocaleString();
}
function fmtFull(n) {
  n = Number(n)||0;
  if (!n) return '0원';
  return n.toLocaleString()+'원';
}
function fmtWon(n) {
  // used in tables — always exact-ish
  n = Number(n)||0;
  if (!n) return '—';
  if (n >= 10000) { const m=Math.floor(n/10000),r=n%10000; return r?m+'만 '+r.toLocaleString():m+'만'; }
  return n.toLocaleString();
}

/* ── Theme / Amt / Page ─────────────── */
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
  ['light','dark','novel'].forEach(k => document.getElementById('tp-'+k).classList.toggle('on', k===t));
  // re-draw charts after theme change
  setTimeout(renderAnalysis, 80);
}
function setAmt(m) {
  amtMode = m;
  localStorage.setItem('amtMode', m);
  document.getElementById('pill-round').classList.toggle('on', m==='round');
  document.getElementById('pill-exact').classList.toggle('on', m==='exact');
  renderCal();
}
function setRange(r) {
  anRange = r;
  localStorage.setItem('anRange', r);
  ['1','3','6','All'].forEach(k => {
    document.getElementById('rp'+k)?.classList.toggle('on', (r===0?'All':r+'')==k);
  });
  // clear custom input when preset clicked
  const ci = document.getElementById('crInput');
  if (ci) ci.value = '';
  renderAnalysis();
}
function onCustomRange(v) {
  const n = parseInt(v);
  if (!n || n < 1) return;
  anRange = n;
  localStorage.setItem('anRange', n);
  // deactivate presets
  ['1','3','6','All'].forEach(k => document.getElementById('rp'+k)?.classList.remove('on'));
  renderAnalysis();
}

function switchPage(p) {
  ['cal','an'].forEach(id => {
    document.getElementById('pg-'+id).classList.toggle('on', id===p);
    document.getElementById('tnb-'+id).classList.toggle('on', id===p);
  });
  if (p === 'an') renderAnalysis();
}

/* ── CSS var getter (for Chart.js) ──── */
function cv(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

/* ── Destroy chart ──────────────────── */
function destroyChart(id) { if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; } }

/* ── Init ────────────────────────────── */
function init() {
  setTheme(localStorage.getItem('theme') || 'dark');
  amtMode = localStorage.getItem('amtMode') || 'round';
  document.getElementById('pill-round').classList.toggle('on', amtMode==='round');
  document.getElementById('pill-exact').classList.toggle('on', amtMode==='exact');
  // restore range
  const savedRange = localStorage.getItem('anRange');
  if (savedRange !== null) {
    anRange = parseInt(savedRange);
    const presets = {0:'All',1:'1',3:'3',6:'6'};
    if (presets[anRange]) {
      document.getElementById('rp'+presets[anRange])?.classList.add('on');
    } else {
      // custom value — show in input, deactivate presets
      const ci = document.getElementById('crInput');
      if (ci) ci.value = anRange;
    }
  } else {
    document.getElementById('rpAll')?.classList.add('on');
  }
  const now = new Date();
  CY = now.getFullYear(); CM = now.getMonth();
  renderCal();
}
function chMonth(d) {
  CM += d;
  if (CM < 0)  { CY--; CM=11; }
  if (CM > 11) { CY++; CM=0; }
  renderCal();
}

/* ── Render Calendar ─────────────────── */
function renderCal() {
  document.getElementById('mYear').textContent = `${CY}년 ${MO_KO[CM]}`;
  document.getElementById('mSub').textContent  = MO_EN[CM]+' '+CY;
  const today=new Date(), firstDay=new Date(CY,CM,1).getDay(), lastDate=new Date(CY,CM+1,0).getDate();
  const grid=document.getElementById('days'); grid.innerHTML='';
  const tot={kaist:0,lib:0,tutor:0};

  for(let i=0;i<firstDay;i++){const c=document.createElement('div');c.className='dc empty';grid.appendChild(c);}
  for(let d=1;d<=lastDate;d++){
    const entry=getD(CY,CM,d);
    if(entry)tot[entry.job]=(tot[entry.job]||0)+(Number(entry.amount)||0);
    const isToday=today.getFullYear()===CY&&today.getMonth()===CM&&today.getDate()===d;
    const cell=document.createElement('div');
    cell.className='dc'+(isToday?' today':'');
    const dn=document.createElement('div');dn.className='dn';dn.textContent=d;cell.appendChild(dn);
    if(entry){
      const bar=document.createElement('div');bar.className=`dc-bar ${entry.job}`;cell.appendChild(bar);
      const amt=document.createElement('div');amt.className='dc-amt';amt.textContent=fmtAmt(entry.amount);cell.appendChild(amt);
    }
    cell.addEventListener('click',()=>openSheet(d));
    grid.appendChild(cell);
  }
  const g=tot.kaist+tot.lib+tot.tutor;
  document.getElementById('sTotal').textContent =g?fmtAmt(g):'—';
  document.getElementById('sKaist').textContent =tot.kaist?fmtAmt(tot.kaist):'—';
  document.getElementById('sLib').textContent   =tot.lib?fmtAmt(tot.lib):'—';
  document.getElementById('sTutor').textContent =tot.tutor?fmtAmt(tot.tutor):'—';
}

/* ══════════════════════════════════════
   ANALYSIS
══════════════════════════════════════ */
function renderAnalysis() {
  const all = collectMonths();

  if (!all.length) {
    document.getElementById('anContent').innerHTML = `
      <div class="empty-an">
        <div class="empty-an-icon">📭</div>
        아직 기록된 데이터가 없어요<br>
        캘린더에서 수입을 기록해보세요
      </div>`;
    return;
  }

  // filter by range
  const data = anRange === 0 ? all : all.slice(-anRange);
  const months = data.length;

  // totals across range
  const tot = { kaist:0, lib:0, tutor:0, total:0 };
  data.forEach(m => { tot.kaist+=m.kaist; tot.lib+=m.lib; tot.tutor+=m.tutor; tot.total+=m.total; });
  const avg = months ? Math.round(tot.total/months) : 0;
  const maxMo = data.reduce((a,b)=>b.total>a.total?b:a, data[0]);
  const minMo = data.filter(m=>m.total>0).reduce((a,b)=>b.total<a.total?b:a, data.find(m=>m.total>0)||data[0]);

  // colors
  const kaistC = cv('--kaist'), libC = cv('--lib'), tutorC = cv('--tutor');
  const goldC  = cv('--gold'), gridC = cv('--grid'), txt3C = cv('--txt3'), txt2C = cv('--txt2');

  let html = '';

  /* ── Stat cards ── */
  html += `<div class="stat-grid">
    <div class="stat-card">
      <div class="stat-lbl">기간 합계</div>
      <div class="stat-val">${fmtWon(tot.total)}</div>
      <div class="stat-sub">${months}개월 기록</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">월 평균</div>
      <div class="stat-val">${fmtWon(avg)}</div>
      <div class="stat-sub">세전 기준</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">최고 수입월</div>
      <div class="stat-val">${fmtWon(maxMo?.total)}</div>
      <div class="stat-sub">${maxMo ? MO_KO[maxMo.month]+' '+maxMo.year : '—'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">최저 수입월</div>
      <div class="stat-val">${fmtWon(minMo?.total)}</div>
      <div class="stat-sub">${minMo ? MO_KO[minMo.month]+' '+minMo.year : '—'}</div>
    </div>
  </div>`;

  /* ── Job breakdown ── */
  const jobs = ['kaist','lib','tutor'];
  const jobRows = jobs.map(j=>({j, amt:tot[j]})).filter(x=>x.amt>0).sort((a,b)=>b.amt-a.amt);
  const maxAmt = jobRows.length ? jobRows[0].amt : 1;

  if (jobRows.length) {
    html += `<div class="an-section">
      <div class="an-title">알바처별 합계</div>
      <div class="job-breakdown">`;
    jobRows.forEach(({j, amt}) => {
      const pct = tot.total ? Math.round(amt/tot.total*100) : 0;
      const barW = maxAmt ? Math.round(amt/maxAmt*100) : 0;
      html += `<div class="jb-row">
        <div class="jb-info">
          <div class="jb-name">${JOB[j].label}</div>
          <div class="jb-bar-wrap"><div class="jb-bar-fill ${j}" style="width:${barW}%"></div></div>
        </div>
        <div class="jb-right">
          <div class="jb-amt ${j}">${fmtWon(amt)}</div>
          <div class="jb-pct">${pct}%</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  /* ── Chart placeholder IDs ── */
  html += `<div class="an-section">
    <div class="an-title">월별 수입 추이</div>
    <div class="chart-card"><div class="chart-card-title">전체 수입</div><div class="chart-wrap h200"><canvas id="chartTotal"></canvas></div></div>
    <div class="chart-card"><div class="chart-card-title">알바처별 구성</div><div class="chart-wrap h200"><canvas id="chartStack"></canvas></div></div>
  </div>`;

  /* ── Monthly table ── */
  html += `<div class="an-section">
    <div class="an-title">월별 상세</div>
    <div class="chart-card" style="padding:14px">
    <table class="mo-table">
      <thead><tr>
        <th>월</th>
        <th style="color:var(--kaist)">카이스트</th>
        <th style="color:var(--lib)">도서관</th>
        <th style="color:var(--tutor)">과외</th>
        <th style="color:var(--gold)">합계</th>
      </tr></thead>
      <tbody>`;

  const sorted = [...data].reverse();
  sorted.forEach(m => {
    const isMax = m.ym === maxMo?.ym;
    html += `<tr class="${isMax?'highlight':''}">
      <td>${MO_KO[m.month]}<span style="font-size:10px;color:var(--txt3);margin-left:4px">${m.year}</span></td>
      <td class="mono">${m.kaist ? fmtWon(m.kaist) : '<span style="color:var(--txt3)">—</span>'}</td>
      <td class="mono">${m.lib   ? fmtWon(m.lib)   : '<span style="color:var(--txt3)">—</span>'}</td>
      <td class="mono">${m.tutor ? fmtWon(m.tutor) : '<span style="color:var(--txt3)">—</span>'}</td>
      <td class="mono" style="color:var(--gold)">${fmtWon(m.total)}</td>
    </tr>`;
  });

  html += `</tbody></table></div></div>`;

  document.getElementById('anContent').innerHTML = html;

  /* ── Draw charts after DOM insert ── */
  requestAnimationFrame(() => {
    const labels = data.map(m => MO_KO[m.month]+ ' ' + String(m.year).slice(2));
    const bg2 = cv('--bg2');

    // ① Total bar
    destroyChart('total');
    const ctx1 = document.getElementById('chartTotal')?.getContext('2d');
    if (ctx1) {
      _charts['total'] = new Chart(ctx1, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: data.map(m=>m.total),
            backgroundColor: data.map(m => m.ym===maxMo?.ym ? goldC : cv('--gold-bg')),
            borderColor: data.map(m => m.ym===maxMo?.ym ? goldC : cv('--brd2')),
            borderWidth: 1, borderRadius: 6, borderSkipped: false,
          }]
        },
        options: {
          responsive:true, maintainAspectRatio:false,
          scales: {
            x: { ticks:{color:txt3C,font:{size:10}}, grid:{display:false}, border:{display:false} },
            y: { ticks:{color:txt3C,font:{size:10},callback:v=>fmtAmt(v)}, grid:{color:gridC}, border:{display:false}, beginAtZero:true }
          },
          plugins: {
            legend:{display:false},
            tooltip:{callbacks:{label:ctx=>' '+fmtFull(ctx.parsed.y)}}
          }
        }
      });
    }

    // ② Stacked bar
    destroyChart('stack');
    const ctx2 = document.getElementById('chartStack')?.getContext('2d');
    if (ctx2) {
      _charts['stack'] = new Chart(ctx2, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label:'카이스트', data:data.map(m=>m.kaist), backgroundColor:kaistC+'55', borderColor:kaistC, borderWidth:1, borderRadius:0, stack:'s' },
            { label:'도서관',   data:data.map(m=>m.lib),   backgroundColor:libC+'55',   borderColor:libC,   borderWidth:1, borderRadius:0, stack:'s' },
            { label:'과외',     data:data.map(m=>m.tutor), backgroundColor:tutorC+'55', borderColor:tutorC, borderWidth:1, borderRadius:4, stack:'s' },
          ]
        },
        options: {
          responsive:true, maintainAspectRatio:false,
          scales: {
            x: { ticks:{color:txt3C,font:{size:10}}, grid:{display:false}, border:{display:false}, stacked:true },
            y: { ticks:{color:txt3C,font:{size:10},callback:v=>fmtAmt(v)}, grid:{color:gridC}, border:{display:false}, stacked:true, beginAtZero:true }
          },
          plugins: {
            legend:{labels:{color:txt2C,font:{size:11},boxWidth:10,padding:14}},
            tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmtFull(ctx.parsed.y)}`}}
          }
        }
      });
    }
  });
}

/* ── Sheet ─────────────────────────── */
function openSheet(day) {
  editDay=day; pickedJob=null;
  const d=new Date(CY,CM,day);
  document.getElementById('shDate').textContent=`${CY}년 ${CM+1}월 ${day}일 (${DOW[d.getDay()]})`;
  document.getElementById('shSub').textContent=MO_EN[CM]+' '+String(day).padStart(2,'0')+', '+CY;
  const entry=getD(CY,CM,day);
  pickedJob=entry?.job||null;
  document.getElementById('amtInp').value=entry?.amount||'';
  document.getElementById('memoInp').value=entry?.memo||'';
  ['kaist','lib','tutor'].forEach(j=>{
    document.getElementById('jb-'+j).className='jb'+(j===pickedJob?` sel ${j}`:'');
  });
  document.getElementById('delBtn').disabled=!entry;
  document.getElementById('backdrop').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  document.body.style.overflow='hidden';
  setTimeout(()=>{if(pickedJob)document.getElementById('amtInp').focus();},100);
}
function closeSheet() {
  document.getElementById('backdrop').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  document.body.style.overflow='';
  editDay=null;pickedJob=null;
}
function pickJob(j) {
  pickedJob=j;
  ['kaist','lib','tutor'].forEach(k=>{document.getElementById('jb-'+k).className='jb'+(k===j?` sel ${j}`:'');});
  document.getElementById('amtInp').focus();
}
function saveAndClose() {
  if(!pickedJob){toast('알바를 선택해주세요','err');return;}
  const amt=parseInt(document.getElementById('amtInp').value)||0;
  if(!amt){toast('금액을 입력해주세요','err');return;}
  const memo=document.getElementById('memoInp').value.trim();
  saveD(CY,CM,editDay,{job:pickedJob,amount:amt,memo});
  toast(`${JOB[pickedJob].short} ${fmtFull(amt)} 저장`,'ok');
  closeSheet(); renderCal();
}
function deleteEntry() {
  if(!editDay)return;
  saveD(CY,CM,editDay,null);
  toast('삭제됐어요');
  closeSheet(); renderCal();
}

/* ── Keyboard ─────────────────────── */
document.addEventListener('keydown', e=>{
  if(e.key==='Enter'&&document.getElementById('sheet').classList.contains('open'))saveAndClose();
  if(e.key==='Escape'){
    if(document.getElementById('sheet').classList.contains('open'))closeSheet();
    if(document.getElementById('dataBg').classList.contains('open'))closeDataModal();
  }
});

/* ── Data Modal ──────────────────── */
function openDataModal(){document.getElementById('dataBg').classList.add('open');}
function closeDataModal(){document.getElementById('dataBg').classList.remove('open');}
function onDataBg(e){if(e.target===document.getElementById('dataBg'))closeDataModal();}
function exportJSON(){
  const data={};
  allKeys().forEach(k=>{data[k]=JSON.parse(localStorage.getItem(k));});
  if(!Object.keys(data).length){toast('저장된 데이터가 없어요','err');return;}
  const now=new Date();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`income_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.json`;
  a.click();URL.revokeObjectURL(url);
  toast('내보내기 완료','ok');closeDataModal();
}
function importJSON(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);let count=0;
      Object.entries(data).forEach(([k,v])=>{
        if(!k.startsWith('inc_'))return;
        // normalize legacy array format → single object
        let entry = Array.isArray(v) ? (v.length ? v[0] : null) : v;
        if(!entry)return;
        localStorage.setItem(k, JSON.stringify(entry));
        count++;
      });
      renderCal();toast(`${count}일 데이터 복원`,'ok');closeDataModal();
    }catch{toast('파일을 읽을 수 없어요','err');}
    input.value='';
  };
  reader.readAsText(file);
}
function confirmClear(){
  if(!confirm('모든 기록을 삭제할까요?\n되돌릴 수 없어요.'))return;
  allKeys().forEach(k=>localStorage.removeItem(k));
  renderCal();toast('전체 삭제 완료');closeDataModal();
}

/* ── Toast ───────────────────────── */
let _tt=null;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=`toast show ${type}`;
  clearTimeout(_tt);_tt=setTimeout(()=>el.className='toast',2800);
}

init();
</script>
</body>
</html>
